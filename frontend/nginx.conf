server {
    listen 3000;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Forward all /api/ requests to the backend service (backend has context-path /api)
    # Using trailing slash in proxy_pass ensures the matched prefix (/api/) is replaced and
    # the remainder of the URI is appended after /api/ on the upstream, avoiding double or missing segments.
    location /api/ {
        proxy_http_version 1.1;
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}