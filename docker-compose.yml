services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: task-management-app-backend:latest
    container_name: task-management-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:taskdb
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVo5MDg3NjU0MzIxYWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXo5MDg3NjU0MzIx
      # Spring Boot automatically converts JWT_SECRET to jwt.secret
      # Alternative: use SPRING_APPLICATION_JSON or explicit property binding
    networks:
      - task-management-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: task-management-app-frontend:latest
    container_name: task-management-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - task-management-network

networks:
  task-management-network:
    driver: bridge