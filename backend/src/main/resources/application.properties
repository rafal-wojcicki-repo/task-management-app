# Server Configuration
server.port=${PORT:8080}

# Database Configuration
# By default use in-memory H2 for local development. When deploying to Render.com
# or other cloud providers, set the following environment variables:
#   SPRING_DATASOURCE_URL (e.g. jdbc:postgresql://host:5432/dbname)
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
#   SPRING_JPA_HBM2DDL (recommended: update or none)

# Use environment variables when present, fallback to H2 in-memory for local dev
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:taskdb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
# Hibernate dialect can be overridden by SPRING_JPA_DATABASE_PLATFORM when using Postgres
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# Expose H2 console only when using H2 (optional)
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JPA Configuration
# JPA Configuration
# Control schema generation via env var `SPRING_JPA_HBM2DDL`.
# For Heroku Postgres prefer `update` or (better) manage schema with Flyway.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HBM2DDL:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# The secret must be Base64-encoded because JwtUtils decodes it before creating the HMAC key.
# This value decodes to 64 bytes to satisfy HS512 (>= 512 bits)
# Spring Boot automatically converts environment variables: JWT_SECRET -> jwt.secret
# This default value is used if JWT_SECRET is not set, otherwise JWT_SECRET takes precedence
jwt.secret=${JWT_SECRET:QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVo5MDg3NjU0MzIxYWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXo5MDg3NjU0MzIx}
jwt.expiration=86400000

# Logging Configuration
logging.level.org.springframework=INFO
logging.level.com.taskmanager=DEBUG

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Use legacy Ant path matcher so SPA double-wildcard + regex patterns are allowed
# This lets mappings like "/**/{path:[^\\.]*}" work with the controller forwarding SPA routes.
spring.mvc.pathmatch.matching-strategy=ant_path_matcher