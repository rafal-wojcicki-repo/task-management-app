# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:h2:mem:taskdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# The secret must be Base64-encoded because JwtUtils decodes it before creating the HMAC key.
# This value decodes to 64 bytes to satisfy HS512 (>= 512 bits)
# Spring Boot automatically converts environment variables: JWT_SECRET -> jwt.secret
# This default value is used if JWT_SECRET is not set, otherwise JWT_SECRET takes precedence
jwt.secret=${JWT_SECRET:QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVo5MDg3NjU0MzIxYWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXo5MDg3NjU0MzIx}
jwt.expiration=86400000

# Logging Configuration
logging.level.org.springframework=INFO
logging.level.com.taskmanager=DEBUG

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method